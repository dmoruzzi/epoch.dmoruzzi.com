<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epoch Time Converter</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"
      integrity="sha512-wnea99uKIC3TJF7v4eKk4Y+lMz2Mklv18+r4na2Gn1abDRPPOeef95xTzdwGD9e6zXJBteMIhZ1+68QC5byJZw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body class="bg-gray-100 min-h-screen flex flex-col justify-center items-center p-6">
    <h2 class="text-3xl font-semibold mb-6">Epoch Time Converter</h2>

    <!-- Epoch Time Conversion Section -->
    <div class="container bg-white rounded-md shadow-md p-6 mb-6 w-full max-w-md">
      <div class="flex gap-4 mb-2">
        <div class="flex-1">
          <div class="flex justify-between items-center mb-2">
            <label for="epochInput" class="block">Epoch Time (s):</label>
          </div>
          <input
            type="text"
            id="epochInput"
            placeholder="Unix time in seconds"
            class="border border-gray-300 px-3 py-2 rounded-md w-full mb-4"
          />
        </div>
        <div class="flex-1">
          <div class="flex justify-between items-center mb-2">
            <label for="epochMsInput" class="block">Unix Time (ms):</label>
          </div>
          <input
            type="text"
            id="epochMsInput"
            placeholder="Unix time in milliseconds"
            class="border border-gray-300 px-3 py-2 rounded-md w-full mb-4"
          />
        </div>
      </div>
      <div class="flex gap-2 mb-2">
        <button
          id="convertEpochToLocalBtn"
          class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 flex-1"
        >
          Seconds
        </button>
        <button
          id="convertMsToLocalBtn"
          class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 flex-1"
        >
          Milliseconds
        </button>
      </div>
      <div class="flex gap-2 mb-4">
        <button id="copyEpochBtn" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300 flex-1 text-sm">
          Copy Epoch (s)
        </button>
        <button id="copyEpochMsBtn" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300 flex-1 text-sm">
          Copy Unix (ms)
        </button>
      </div>
      <div id="localOutput12hr" class="mt-2 cursor-pointer hover:text-blue-600" title="Click to copy"></div>
      <div id="localOutput24hr" class="cursor-pointer hover:text-blue-600" title="Click to copy"></div>
      <div id="isoTZOutput" class="cursor-pointer hover:text-blue-600" title="Click to copy"></div>
      <hr class="my-2 border-gray-300">
      <div id="utcOutput" class="cursor-pointer hover:text-blue-600" title="Click to copy"></div>
      <div id="utcOutput24hr" class="cursor-pointer hover:text-blue-600" title="Click to copy"></div>
      <div id="isoUTCOutput" class="cursor-pointer hover:text-blue-600" title="Click to copy"></div>
    </div>

    <!-- ISO 8601 Date String Conversion Section -->
    <div class="container bg-white rounded-md shadow-md p-6 mb-6 w-full max-w-md">
      <div class="flex justify-between items-center mb-2">
        <label for="isoInput" class="block">ISO 8601 Date String:</label>
        <button id="clearISOBtn" class="text-sm text-gray-500 hover:text-red-500" title="Clear">✕</button>
      </div>
      <input
        type="text"
        id="isoInput"
        placeholder="Enter ISO 8601 Date String"
        class="border border-gray-300 px-3 py-2 rounded-md w-full mb-4"
      />
      <div id="localOutputISO" class="mt-2 cursor-pointer hover:text-blue-600" title="Click to copy"></div>
      <div id="utcOutputISO" class="cursor-pointer hover:text-blue-600" title="Click to copy"></div>
    </div>

    <!-- Local Date and Time Conversion Section -->
    <div class="container bg-white rounded-md shadow-md p-6 mb-6 w-full max-w-md">
      <div class="flex justify-between items-center mb-2">
        <label for="dateInput" class="block">Local Date:</label>
        <button id="clearLocalBtn" class="text-sm text-gray-500 hover:text-red-500" title="Clear">✕</button>
      </div>
      <input
        type="date"
        id="dateInput"
        class="border border-gray-300 px-3 py-2 rounded-md w-full mb-4"
      />
      <label for="timeInput" class="block mb-2">Local Time:</label>
      <input
        type="time"
        id="timeInput"
        class="border border-gray-300 px-3 py-2 rounded-md w-full mb-4"
      />
    </div>

    <!-- UUIDv7 Generator Section -->
    <div class="container bg-white rounded-md shadow-md p-6 w-full max-w-md">
      <div class="flex justify-between items-center mb-2">
        <label for="UUIDv7Output" class="block">UUIDv7:</label>
        <button id="copyUUIDBtn" class="text-sm bg-gray-200 text-gray-700 px-2 py-1 rounded hover:bg-gray-300" title="Copy UUID">Copy</button>
      </div>
      <input
        type="text"
        id="UUIDv7Output"
        placeholder="Enter UUIDv7 to reverse"
        class="border border-gray-300 px-3 py-2 rounded-md w-full mb-4 font-mono text-sm"
      />
      <button
        id="generateUUIDv7Btn"
        class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 w-full"
      >
        Randomize
      </button>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-green-600 text-white px-4 py-2 rounded-md shadow-lg opacity-0 transition-opacity duration-300">
      Copied to clipboard!
    </div>
    <script src="assets/js/app.js"></script>
  </body>
</html>
